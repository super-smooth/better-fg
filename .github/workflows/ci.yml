name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.25'

jobs:
  check-prerequisites:
    name: Check PR prerequisites
    runs-on: ubuntu-latest
    outputs:
      should-skip: ${{ steps.check.outputs.should-skip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Check out the actual PR head, not the merge commit
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check if we should skip expensive jobs
        id: check
        run: |
          BOT_NAME="${{ vars.BOT_NAME || 'super-smooth-bot' }}"
          
          echo "=== Debug Info ==="
          echo "Event name: ${{ github.event_name }}"
          echo "Base ref: ${{ github.base_ref }}"
          echo "PR head SHA: ${{ github.event.pull_request.head.sha }}"
          echo "BOT_NAME: $BOT_NAME"
          echo ""
          echo "=== Recent commits ==="
          git log --oneline -5
          echo ""
          
          # Only skip on pull_request events
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Not a pull request, running normally"
            echo "should-skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check if go.mod was modified in this PR
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "=== Changed files ==="
          echo "$CHANGED_FILES"
          echo ""
          
          if echo "$CHANGED_FILES" | grep -q "^go\\.mod$"; then
            echo "go.mod was modified in this PR"
            
            # Check if the HEAD commit is by the bot
            COMMIT_AUTHOR=$(git log -1 --pretty=format:'%an')
            COMMIT_EMAIL=$(git log -1 --pretty=format:'%ae')
            echo "=== Commit details ==="
            echo "Commit author name: '$COMMIT_AUTHOR'"
            echo "Commit author email: '$COMMIT_EMAIL'"
            echo "Expected bot name: '$BOT_NAME'"
            echo ""
            
            if [ "$COMMIT_AUTHOR" = "$BOT_NAME" ]; then
              echo "This is a bot commit, running normally"
              echo "should-skip=false" >> $GITHUB_OUTPUT
            else
              echo "This is not a bot commit (author mismatch), skipping expensive jobs"
              echo "should-skip=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "go.mod was not modified, running normally"
            echo "should-skip=false" >> $GITHUB_OUTPUT
          fi

  test:
    name: Test
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.should-skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.4
      - name: Install direnv
        run: |
          curl -sfL https://direnv.net/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', '**/go.sum', '**/gomod2nix.toml') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # collect garbage until the Nix store size (in bytes) is at most this number
          # before trying to save a new cache
          # 1G = 1073741824
          gc-max-store-size-linux: 1G
          # do purge caches
          purge: true
          # purge all versions of the cache
          purge-prefixes: nix-${{ runner.os }}-
          # created more than this number of seconds ago
          purge-created: 0
          # or, last accessed more than this number of seconds ago
          # relative to the start of the `Post Restore and save Nix store` phase
          purge-last-accessed: 0
          # except any version with the key that is the same as the `primary-key`
          purge-primary-key: never
      - name: Allow direnv
        run: direnv allow
      - name: Download dependencies
        run: direnv exec . go mod download
      - name: Run unit tests
        run: direnv exec . go test -v -race -coverprofile=coverage.out ./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella
  lint:
    name: Lint
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.should-skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.4
      - name: Install direnv
        run: |
          curl -sfL https://direnv.net/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', '**/go.sum', '**/gomod2nix.toml') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # collect garbage until the Nix store size (in bytes) is at most this number
          # before trying to save a new cache
          # 1G = 1073741824
          gc-max-store-size-linux: 1G
          # do purge caches
          purge: true
          # purge all versions of the cache
          purge-prefixes: nix-${{ runner.os }}-
          # created more than this number of seconds ago
          purge-created: 0
          # or, last accessed more than this number of seconds ago
          # relative to the start of the `Post Restore and save Nix store` phase
          purge-last-accessed: 0
          # except any version with the key that is the same as the `primary-key`
          purge-primary-key: never
      - name: Allow direnv
        run: direnv allow
      - name: golangci-lint
        run: direnv exec . golangci-lint run --timeout=5m
      - name: Check formatting
        run: |
          if [ "$(direnv exec . gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            direnv exec . gofmt -s -l .
            exit 1
          fi
      - name: Go vet
        run: direnv exec . go vet ./...
  nix-build:
    name: Nix Build
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.should-skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.4
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', '**/go.sum', '**/gomod2nix.toml') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # collect garbage until the Nix store size (in bytes) is at most this number
          # before trying to save a new cache
          # 1G = 1073741824
          gc-max-store-size-linux: 1G
          # do purge caches
          purge: true
          # purge all versions of the cache
          purge-prefixes: nix-${{ runner.os }}-
          # created more than this number of seconds ago
          purge-created: 0
          # or, last accessed more than this number of seconds ago
          # relative to the start of the `Post Restore and save Nix store` phase
          purge-last-accessed: 0
          # except any version with the key that is the same as the `primary-key`
          purge-primary-key: never
      - name: Check flake
        run: nix flake check
      - name: Build package
        run: nix build .#default
      - name: Test built binary
        run: |
          ./result/bin/better-fg init
      - name: Check flake.lock is up to date
        run: |
          nix flake update --commit-lock-file || true
          if ! git diff --quiet flake.lock; then
            echo "flake.lock is not up to date. Please run 'nix flake update' and commit the changes."
            git diff flake.lock
            exit 1
          fi
  build-linux-x86_64:
    name: Build Linux x86_64
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.should-skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.4
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', '**/go.sum', '**/gomod2nix.toml') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: 0
          purge-primary-key: never
      - name: Build with Nix
        run: nix build .#packages.x86_64-linux.default
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: better-fg-x86_64-linux
          path: result/bin/better-fg
  build-linux-aarch64:
    name: Build Linux aarch64
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.should-skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.4
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', '**/go.sum', '**/gomod2nix.toml') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: 0
          purge-primary-key: never
      - name: Build aarch64 binary with Go cross-compilation
        run: |
          mkdir -p dist
          nix develop --command bash -c 'CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o dist/better-fg-aarch64-linux ./cmd/better-fg'
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: better-fg-aarch64-linux
          path: dist/better-fg-aarch64-linux
  build-darwin:
    name: Build Darwin
    needs: check-prerequisites
    if: needs.check-prerequisites.outputs.should-skip == 'false'
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.4
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock', '**/go.sum', '**/gomod2nix.toml') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: 0
          purge-primary-key: never
      - name: Build with Nix
        run: nix build .#packages.${{ matrix.arch }}-darwin.default
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: better-fg-${{ matrix.arch }}-darwin
          path: result/bin/better-fg
